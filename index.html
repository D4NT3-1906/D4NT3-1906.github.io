<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMS Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .table-container { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center">Todays Records</h1>
        <div class="table-container">
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Student Name</th>
                        <th>RFID UID</th>
                        <th>Classes Attended</th>
                        <th>Total Classes</th>
                        <th>Attendance %</th>
                    </tr>
                </thead>
                <tbody id="attendance-data">
                    </tbody>
            </table>
        </div>
    </div>
    <script>
        [span_12](start_span)
        const apiBaseUrl = 'https://your-namecheap-domain.com/api'; 
        async function fetchAttendanceData() {
            try {
                [span_13](start_span)
                const response = await fetch(`${apiBaseUrl}/get_attendance.php`);
                const data = await response.json();
                const tableBody = document.getElementById('attendance-data');
                tableBody.innerHTML = ''; 
                data.forEach(student => {
                    [span_14](start_span)[span_15](start_span)
                    const percentage = student.total_classes > 0 
                        ? ((student.attended_classes / student.total_classes) * 100).toFixed(2)
                        : 0;
                    const row = `
                        <tr>
                            <td>${student.name}</td>
                            <td>${student.rfid_uid}</td>
                            <td>${student.attended_classes}</td>
                            <td>${student.total_classes}</td>
                            <td>
                                <div class="progress">
                                    <div class="progress-bar ${percentage < 75 ? 'bg-danger' : 'bg-success'}" 
                                         role="progressbar" 
                                         style="width: ${percentage}%" 
                                         aria-valuenow="${percentage}" 
                                         aria-valuemin="0" 
                                         aria-valuemax="100">
                                        ${percentage}%
                                    </div>
                                </div>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error fetching attendance data:', error);
            }
        }
        fetchAttendanceData();
    </script>
</body>
</html>
