<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAMS Attendance Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .dashboard { display: none; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .stat { text-align: center; padding: 15px; border-radius: 8px; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-container">
        <div class="card" style="width: 350px; text-align: center;">
            <h2>SAMS Portal</h2>
            <input type="password" id="adminPass" placeholder="Admin Password" style="width: 90%; padding: 10px; margin-bottom: 15px;">
            <button class="btn btn-primary" onclick="attemptLogin()">Enter Dashboard</button>
        </div>
    </div>

    <div id="dashSection" class="dashboard">
        <div class="grid">
            <div class="stat" style="background: #3b82f6;"><h3>Present</h3><h2 id="countPresent">0</h2></div>
            <div class="stat" style="background: #10b981;"><h3>Left Midway</h3><h2 id="countLeft">0</h2></div>
            <div class="stat" style="background: #6366f1;"><h3>Total Class</h3><h2 id="countTotal">0</h2></div>
        </div>

        <div class="card">
            <h3>Class Control Center</h3>
            <select id="subjectSel" class="btn" style="background: white; border: 1px solid #ccc;">
                <option value="Java">Java</option>
                <option value="DBMS">DBMS</option>
                <option value="Maths">Maths</option>
                <option value="Computer Networks">Computer Networks</option>
                <option value="Artificial Intelligence">Artificial Intelligence</option>
                <option value="Data Structures">Data Structures</option>
            </select>
            <button class="btn btn-primary" onclick="controlSession(true)">Start Session</button>
            <button class="btn btn-danger" onclick="controlSession(false)">End Session</button>
            <button class="btn" onclick="downloadReport()" style="float: right; background: #8b5cf6; color: white;">Download PDF Report</button>
        </div>

        <div class="card">
            <h3>Student Registry (CSV)</h3>
            <input type="file" id="csvInput" accept=".csv">
            <button class="btn btn-primary" onclick="uploadCSV()">Sync Master List</button>
        </div>

        <div class="card">
            <h3>Live Attendance Log</h3>
            <table id="attendanceTable">
                <thead><tr><th>Name</th><th>UID</th><th>Arrival</th><th>Status</th></tr></thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // CONFIG
        const firebaseConfig = { 
            databaseURL: "https://sams-190605-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function attemptLogin() {
            if(document.getElementById('adminPass').value === "admin123") {
                document.getElementById('loginSection').style.display = "none";
                document.getElementById('dashSection').style.display = "block";
                startListeners();
            } else { alert("Access Denied"); }
        }

        function controlSession(state) {
            const sub = document.getElementById('subjectSel').value;
            db.ref('current_session').set({
                status: state,
                subject: sub,
                timestamp: Date.now()
            });
        }

        function uploadCSV() {
            const file = document.getElementById('csvInput').files[0];
            Papa.parse(file, {
                header: true,
                complete: function(results) {
                    let updates = {};
                    results.data.forEach(row => {
                        if(row.UID) updates[row.UID.trim().toUpperCase()] = { name: row.Name };
                    });
                    db.ref('students').update(updates).then(() => alert("Master List Updated!"));
                }
            });
        }

        function startListeners() {
            const today = new Date().toISOString().split('T')[0];
            db.ref('current_session/subject').on('value', snap => {
                const sub = snap.val();
                if(!sub) return;
                
                db.ref(`attendance_logs/${sub}/${today}`).on('value', snapshot => {
                    const tbody = document.getElementById('logBody');
                    tbody.innerHTML = "";
                    let p = 0, l = 0;
                    
                    snapshot.forEach(child => {
                        const val = child.val();
                        if(val.status === "Present") p++; else l++;
                        tbody.innerHTML += `<tr><td>${val.name}</td><td>${child.key}</td><td>${val.arrival}</td><td>${val.status}</td></tr>`;
                    });
                    document.getElementById('countPresent').innerText = p;
                    document.getElementById('countLeft').innerText = l;
                });
            });
        }

        async function downloadReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const sub = document.getElementById('subjectSel').value;
            
            // Get all students to show even those with 0 attendance
            const allStudents = (await db.ref('students').once('value')).val();
            const logs = (await db.ref(`attendance_logs/${sub}`).once('value')).val();

            let rows = [];
            Object.keys(allStudents).forEach(uid => {
                rows.push([allStudents[uid].name, uid, "Absent"]); // Logic for report can be expanded here
            });

            doc.text(`SAMS Report: ${sub}`, 14, 20);
            doc.autoTable({ head: [['Name', 'UID', 'Attendance']], body: rows, startY: 30 });
            doc.save(`SAMS_${sub}_Report.pdf`);
        }
    </script>
</body>
</html>
