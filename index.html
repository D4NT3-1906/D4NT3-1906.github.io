<!DOCTYPE html>
<html>
<head>
    <title>SAMS Admin Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; }
        #loginPage { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #dashPage { display: none; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="card">
        <h2>SAMS Login</h2>
        <input type="password" id="passInput" placeholder="Enter Admin Password">
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="dashPage">
    <div class="card">
        <h3>Class Control</h3>
        <select id="subSel">
            <option>Java</option><option>DBMS</option><option>AI</option>
        </select>
        <button onclick="updateSession(true)">Start Session</button>
        <button onclick="updateSession(false)" style="background:red; color:white">Stop Session</button>
    </div>

    <div class="card">
        <h3>Live Stats</h3>
        <p>Present: <span id="countPres">0</span> | Absent: <span id="countAbs">0</span> | Left Midway: <span id="countLeft">0</span></p>
    </div>

    <div class="card">
        <h3>Registry & Reports</h3>
        <input type="file" id="csvFile">
        <button onclick="uploadCSV()">Upload Student List</button>
        <button onclick="generateReport()" style="float:right">Download PDF (7 Days)</button>
    </div>

    <div class="card">
        <table id="liveTable">
            <thead><tr><th>Name</th><th>UID</th><th>Arrival</th><th>Status</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
const firebaseConfig = { databaseURL: "https://sams-190605-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function login() {
    if(document.getElementById('passInput').value === "admin123") {
        document.getElementById('loginPage').style.display = "none";
        document.getElementById('dashPage').style.display = "block";
        startListeners();
    } else { alert("Wrong Password"); }
}

function updateSession(status) {
    db.ref('current_session').update({
        status: status,
        subject: document.getElementById('subSel').value,
        duration: 60
    });
}

function uploadCSV() {
    Papa.parse(document.getElementById('csvFile').files[0], {
        header: true,
        complete: function(res) {
            let updates = {};
            res.data.forEach(r => { if(r.UID) updates[r.UID] = {name: r.Name}; });
            db.ref('students').update(updates);
            alert("List Synced!");
        }
    });
}

function startListeners() {
    // Update table and stats in real-time
    db.ref('attendance_logs').on('value', snap => {
        // Logic to update stats and table based on current date
    });
}

async function generateReport() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const allStudents = (await db.ref('students').once('value')).val();
    const attendance = (await db.ref('attendance_logs').once('value')).val();
    
    let rows = [];
    Object.keys(allStudents).forEach(uid => {
        rows.push([allStudents[uid].name, uid, "Present"]); // Logic to check attendance nodes
    });

    doc.text("Attendance Report", 14, 15);
    doc.autoTable({ head: [['Name', 'UID', 'Status']], body: rows });
    doc.save("Report.pdf");
}
</script>
</body>
</html>
