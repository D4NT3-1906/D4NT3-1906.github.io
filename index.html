<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SAMS | Management Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #4f46e5; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .header { background: var(--primary); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 40px; max-width: 1200px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .controls { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 20px; align-items: end; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8fafc; color: #64748b; padding: 15px; text-align: left; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; transition: 0.2s; }
        .btn-p { background: var(--primary); } .btn-s { background: #10b981; }
        .btn:hover { opacity: 0.9; }
        #login-screen { position: fixed; inset: 0; background: #0f172a; z-index: 999; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card" style="width: 350px; text-align: center;">
        <h2 style="color:var(--primary)">SAMS LOGIN</h2>
        <input type="text" id="u" placeholder="Admin Username" style="width:100%; padding:10px; margin-bottom:10px; box-sizing: border-box;">
        <input type="password" id="p" placeholder="Passcode" style="width:100%; padding:10px; margin-bottom:20px; box-sizing: border-box;">
        <button class="btn btn-p" onclick="login()" style="width:100%">Enter Dashboard</button>
    </div>
</div>

<div id="dashboard" style="display:none">
    <div class="header">
        <h1 style="margin:0; font-size: 24px;">SAMS | Monitor Station</h1>
        <span>Admin: <b>Nilutpal</b></span>
    </div>

    <div class="container">
        <div class="card controls">
            <div>
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Student Master List (PDF)</label>
                <input type="file" id="pdfUpload">
                <button class="btn btn-p" onclick="syncPDF()" style="margin-top:10px;">Process & Sync List</button>
            </div>
            <div>
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Subject</label>
                <select id="subjSelect" onchange="loadData()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;">
                    <option>Maths</option><option>Data Structures</option><option>Java</option>
                    <option>Computer Networks</option><option>Artificial Intelligence</option><option>DBMS</option>
                </select>
            </div>
            <div>
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">Period</label>
                <select id="dayRange" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; margin-bottom: 10px;">
                    <option value="7">Last 7 Days</option><option value="14">Last 14 Days</option><option value="30">Last 30 Days</option>
                </select>
                <button class="btn btn-s" onclick="genReport()" style="width:100%">Generate PDF Report</button>
            </div>
        </div>

        <div class="card">
            <table id="attendanceTable">
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>RFID Number</th>
                        <th>Arrival Time</th>
                        <th>Departure Time</th>
                        <th>Attendance %</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyC25jnEJ-6-t0hoE3m8xiPEHfWyC-ejMKE",
        authDomain: "sams-190605.firebaseapp.com",
        databaseURL: "https://sams-190605-default-rtdb.firebaseio.com",
        projectId: "sams-190605",
        storageBucket: "sams-190605.firebasestorage.app",
        appId: "1:157575474369:web:87cc48405cee803da83840"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function login() {
        if(document.getElementById('u').value === "ADMIN" && document.getElementById('p').value === "123456") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadData();
        } else { alert("Invalid Credentials"); }
    }

    function syncPDF() {
        const file = document.getElementById('pdfUpload').files[0];
        if(!file) return alert("Please select a PDF file first.");
        alert("Analyzing Student Document...");
        // Mock sync logic
        database.ref('system_status').set({ last_sync: new Date().toLocaleString(), status: "Success" });
        alert("Student list successfully synced with Cloud Database.");
    }

    function loadData() {
        const subject = document.getElementById('subjSelect').value;
        const ref = database.ref('attendance_logs/' + subject);
        
        ref.on('value', (snap) => {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(k => {
                    const v = data[k];
                    const depText = v.departureTime === "--" ? "<span style='color:blue'>In Session</span>" : v.departureTime;
                    tbody.innerHTML += `<tr>
                        <td><b>${v.studentName}</b></td>
                        <td style='font-family:monospace'>${v.rfidNumber}</td>
                        <td>${v.arrivalTime}</td>
                        <td>${depText}</td>
                        <td>${v.percentage}</td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = "<tr><td colspan='5' style='text-align:center'>Waiting for scans...</td></tr>";
            }
        });
    }

    function genReport() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4'); // Landscape for 5 columns
        const sub = document.getElementById('subjSelect').value;
        const range = document.getElementById('dayRange').value;
        
        doc.text(`SAMS ATTENDANCE REPORT: ${sub} (Last ${range} Days)`, 14, 15);
        doc.autoTable({ html: '#attendanceTable', startY: 25, theme: 'grid' });
        doc.save(`SAMS_${sub}_Report.pdf`);
    }
</script>
</body>
</html>
